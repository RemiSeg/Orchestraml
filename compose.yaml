name: orchestraml

services:
  postgres:
    image: postgres:17.6
    environment:
      POSTGRES_USER: orchestraml
      POSTGRES_PASSWORD: orchestraml
      POSTGRES_DB: orchestraml
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orchestraml -d orchestraml"]
      interval: 2s
      timeout: 3s
      retries: 20
    volumes:
      - orchestraml-postgres:/var/lib/postgresql/data

volumes:
  orchestraml-postgres:
